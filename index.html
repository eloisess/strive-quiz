  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--linen);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .quiz-wrap {
    width: 100%;
    max-width: 680px;
  }

  /* ── HEADER ── */
  .quiz-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .quiz-eyebrow {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--olive);
    display: block;
    margin-bottom: 0.85rem;
  }

  .quiz-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 300;
    color: var(--choc);
    line-height: 1.1;
    margin-bottom: 0.85rem;
  }

    font-weight: 300;
    color: var(--choc-dim);
    line-height: 1.8;

    margin-bottom: 2.5rem;
  }

    height: 1px;
    background: var(--choc-faint);
    position: relative;
    margin-bottom: 0.6rem;
  }

  .quiz-progress-fill {
    height: 100%;
    background: var(--olive);
    transition: width 0.5s ease;
  }

  .quiz-progress-label {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.15em;
    color: rgba(40,17,6,0.3);
    text-align: right;

  /* ── QUESTION CARD ── */

    border: 0.5px solid var(--choc-faint);
    padding: 2.5rem;
    animation: fadeUp 0.4s ease;
  }

    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .quiz-q-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(122,122,82,0.45);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;

  .quiz-q-text {
    font-family: 'Cormorant Garamond', serif;

    font-weight: 500;
    color: var(--choc);
    line-height: 1.25;
    margin-bottom: 0.5rem;
  }

  .quiz-q-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--choc-dim);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  /* ── OPTIONS ── */

    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .quiz-option {

    gap: 1rem;
    padding: 1rem 1.25rem;
    border: 0.5px solid rgba(40,17,6,0.1);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: transparent;
    width: 100%;
    text-align: left;

  .quiz-option:hover {
    border-color: var(--olive);
    background: var(--olive-light);
  }

    border-color: var(--olive);
    background: var(--olive-light);

    height: 16px;

    left: 50%;

    height: 6px;
    border-radius: 50%;

// Scoring logic
function getResult(answers) {
  const main = answers.main;
  const goals = answers.goals;

  const scoreMap = {
    hydration: 0, myers: 0, vitality: 0, neuro: 0,
    lumina: 0, immune: 0, balance: 0, metabolic: 0
  };

  // Main feeling
  if (main === 'depleted') { scoreMap.hydration += 3; scoreMap.myers += 1; }
  if (main === 'energy') { scoreMap.vitality += 3; scoreMap.myers += 1; }
  if (main === 'stress') { scoreMap.neuro += 3; }
  if (main === 'beauty') { scoreMap.lumina += 3; }
  if (main === 'immune') { scoreMap.immune += 3; scoreMap.myers += 1; }
  if (main === 'hormonal') { scoreMap.balance += 3; }
  if (main === 'metabolic') { scoreMap.metabolic += 3; }

  // Goals
  if (goals === 'rehydrate') { scoreMap.hydration += 2; }
  if (goals === 'energy') { scoreMap.vitality += 2; scoreMap.myers += 1; }
  if (goals === 'calm') { scoreMap.neuro += 2; }
  if (goals === 'skin') { scoreMap.lumina += 2; }
  if (goals === 'immune') { scoreMap.immune += 2; }
  if (goals === 'balance') { scoreMap.balance += 2; }
  if (goals === 'metabolic') { scoreMap.metabolic += 2; }

  // First timer — nudge toward hydration elixir or myers
  if (answers.experience === 'first') {
    scoreMap.hydration += 1;
    scoreMap.myers += 1;
  }

  // Get winner
  return Object.entries(scoreMap).sort((a, b) => b[1] - a[1])[0][0];
}

    label.textContent = 'Complete';

    container.innerHTML = `
      <div class="quiz-result">
        <div class="quiz-result-header">
          <span class="quiz-result-label">Your personalised recommendation</span>
          <div class="quiz-result-title">We recommend <em>${t.name}</em></div>
        </div>

        <div class="quiz-result-card">
          <span class="result-tag">${t.tag}</span>
          <div class="result-name">${t.name}</div>
          <div class="result-subtitle">${t.dur}</div>
          <div class="result-why">${t.why}</div>
          <span class="result-ingredients-label">Ingredients</span>
          <div class="result-ingredients">${t.ingredients}</div>
          <div class="result-price-row">
            <div class="result-price">${t.price}</div>
            <div class="result-dur">${t.dur}</div>
          </div>
          <a class="result-book" href="${t.url}" target="_blank">Book this treatment</a>
        </div>

        ${wantAddons ? `
        <div class="result-addons-card">
          <div class="result-addons-title">Recommended add-ons for you</div>
          <div class="result-addons-sub">Boosters that pair well with ${t.name}</div>
          ${t.addons.map(a => `
            <div class="addon-item">
              <div class="addon-item-name">${a.name} <span style="font-weight:300;color:var(--olive);">${a.price}</span></div>
              <div class="addon-item-desc">${a.desc}</div>
              ${a.pkg ? `<div class="addon-item-pkg">✦ ${a.pkg}</div>` : ''}
            </div>
          `).join('')}
        </div>
        ` : ''}

        <div class="result-retake">
          <button class="result-retake-btn" onclick="retake()">← Retake the quiz</button>
        </div>
      </div>
    `;
    return;
  }

  const q = questions[current];
  const pct = ((current) / questions.length) * 100;
  fill.style.width = pct + '%';
  label.textContent = `Question ${current + 1} of ${questions.length}`;

  container.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q-num">Question ${q.num}</div>
      <div class="quiz-q-text">${q.text}</div>
      <div class="quiz-q-sub">${q.sub}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option ${answers[q.id] === opt.value ? 'selected' : ''}" onclick="select('${q.id}', '${opt.value}', this)">
            <div class="quiz-option-dot"></div>
            <div class="quiz-option-text">
              <strong>${opt.label}</strong>
              ${opt.sub ? opt.sub : ''}
            </div>
          </button>
        `).join('')}
      </div>
      <div class="quiz-nav">
        <button class="quiz-back" ${current === 0 ? 'disabled' : ''} onclick="back()">← Back</button>
        <button class="quiz-next" id="nextBtn" ${answers[q.id] ? '' : 'disabled'} onclick="next()">
          ${current === questions.length - 1 ? 'See my recommendation →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
}

function select(qId, value, el) {
  answers[qId] = value;
  document.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function next() {
  if (!answers[questions[current].id]) return;
  current++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function back() {
  if (current > 0) {
    current--;
    render();
  }
}

function retake() {
  current = 0;
  answers = {};
  document.getElementById('progressFill').style.width = '0%';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Squarespace-safe initialisation
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', render);
} else {
  render();
}
window.addEventListener('load', function() {
  if (!document.getElementById('quizContainer').innerHTML) render();
});
// Extra fallback for Squarespace
setTimeout(function() {
  var c = document.getElementById('quizContainer');
  if (c && !c.innerHTML) render();
}, 500);
setTimeout(function() {
  var c = document.getElementById('quizContainer');
  if (c && !c.innerHTML) render();
}, 1500);
</script>
</body>
</html>
